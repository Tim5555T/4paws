<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Paws Canteen - 修复增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .hidden { display: none !important; }
        .receipt-font { font-family: 'Courier New', Courier, monospace; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 border-t-8 border-orange-500 text-center">
            <h1 class="text-3xl font-black italic">4 PAWS CANTEEN</h1>
            <p class="text-gray-400 text-[10px] mb-6 tracking-widest uppercase">System Management</p>
            <div class="space-y-4">
                <input type="text" id="adminId" value="0182301130" class="w-full p-4 border rounded-xl font-bold">
                <input type="password" id="adminPwd" value="admin123456" class="w-full p-4 border rounded-xl font-bold">
                <button onclick="handleLogin()" class="w-full bg-orange-600 text-white font-black py-4 rounded-xl">进入系统</button>
            </div>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center">
            <span class="font-black italic">4 PAWS</span>
            <div class="flex space-x-2 text-[10px] font-bold">
                <button onclick="switchTab('dashboard')" class="bg-slate-800 px-3 py-2 rounded">📊 看板</button>
                <button onclick="switchTab('pos')" class="bg-slate-800 px-3 py-2 rounded">🛒 开单</button>
                <button onclick="switchTab('inventory')" class="bg-slate-800 px-3 py-2 rounded">📥 入库</button>
                <button onclick="switchTab('history')" class="bg-slate-800 px-3 py-2 rounded">📜 日志</button>
            </div>
        </nav>

        <main class="p-4 max-w-6xl mx-auto">
            
            <div id="tab-dashboard" class="hidden space-y-4">
                <div id="stockAlert" class="hidden bg-red-500 text-white p-3 rounded-xl font-bold text-center">🚨 有货品库存不足！请查看入库单</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-2xl shadow">
                        <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase">营收趋势</h3>
                        <canvas id="revChart"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow">
                        <h3 class="text-xs font-bold text-gray-400 mb-4 uppercase">利润排行榜 Top 5</h3>
                        <div id="profitRank" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <div id="tab-pos" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow space-y-4">
                    <h2 class="text-xl font-black border-b pb-2">🛒 手机开单</h2>
                    <input type="text" id="custName" placeholder="顾客名字" class="w-full p-3 border rounded-xl font-bold" onchange="updateReceipt()">
                    <div class="bg-blue-50 p-4 rounded-xl space-y-3">
                        <select id="posSelect" class="w-full p-3 border rounded-lg bg-white" onchange="autoPrice()"></select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="posQty" value="1" class="p-3 border rounded-lg" placeholder="数量">
                            <input type="number" id="posPrice" class="p-3 border rounded-lg text-blue-600 font-bold" placeholder="售价">
                        </div>
                        <button onclick="addToCart()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">➕ 加入清单 (Add)</button>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-red-500">整单折扣 RM</label>
                        <input type="number" id="posDisc" value="0" class="w-full p-2 border rounded" onchange="renderCart()">
                    </div>
                    <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg">✅ 确认收款并保存</button>
                </div>

                <div id="receiptArea" class="bg-white p-8 shadow-2xl rounded border receipt-font text-[10px] w-full max-w-sm mx-auto">
                    <div class="text-center border-b pb-4 mb-4">
                        <h1 class="text-2xl font-black italic">4 PAWS CANTEEN</h1>
                        <p id="r-no" class="text-[8px] opacity-50">INV-2026-XXXX</p>
                    </div>
                    <div class="flex justify-between mb-4"><span id="r-cust" class="font-bold uppercase">GUEST</span><span id="r-date"></span></div>
                    <table class="w-full mb-6">
                        <thead class="border-b"><tr class="text-left font-bold"><td>商品</td><td>数</td><td class="text-right">额</td><td></td></tr></thead>
                        <tbody id="r-items"></tbody>
                    </table>
                    <div class="text-right space-y-1">
                        <p id="r-disc-row" class="text-red-600 hidden">折扣: -RM <span id="r-disc-val">0.00</span></p>
                        <p class="text-lg font-black">总计: RM <span id="r-total">0.00</span></p>
                    </div>
                </div>
            </div>

            <div id="tab-inventory" class="hidden bg-white p-6 rounded-2xl shadow">
                <div class="flex justify-between mb-4">
                    <h2 class="text-xl font-black italic">📥 批量入库 (中国订单)</h2>
                    <div class="text-xs font-bold flex space-x-2">
                        <span>汇率:<input type="number" id="rate" value="0.65" step="0.01" class="w-12 border-b" onchange="recalcInv()"></span>
                        <span>运费:<input type="number" id="ship" value="0" class="w-12 border-b" onchange="recalcInv()"></span>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs mb-4 min-w-[600px]">
                        <thead><tr class="bg-gray-50 border-b"><th>商品ID</th><th>模式</th><th>数量</th><th>规格</th><th>RMB总</th><th class="text-green-600">MYR成本</th><th>卖价</th><th></th></tr></thead>
                        <tbody id="invRows"></tbody>
                    </table>
                </div>
                <div class="flex space-x-2">
                    <button onclick="addInvRow()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold">➕ 加一行</button>
                    <button onclick="saveInvToCloud()" class="flex-[2] bg-black text-white py-3 rounded-xl font-black">🚀 一键保存到云端</button>
                </div>
            </div>

            <div id="tab-history" class="hidden bg-white p-6 rounded-2xl shadow">
                <h2 class="text-xl font-black mb-4 italic">📜 销售流水</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b text-left"><tr class="p-2"><th>单号</th><th>日期</th><th>顾客</th><th>总计</th><th>利润</th></tr></thead>
                        <tbody id="histBody"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        const SB_URL = "https://kazkzgnfdprrfefckjfr.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imthemt6Z25mZHBycmZlZmNramZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTg3MDEsImV4cCI6MjA4ODU5NDcwMX0.BSog5GqzAk41Z45biSU7ERhEm2PBjuqrbkZJ6b7DgIc";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let cloudProds = [], cart = [], chart = null;

        async function handleLogin() {
            if(document.getElementById('adminId').value === '0182301130' && document.getElementById('adminPwd').value === 'admin123456') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainSystem').classList.remove('hidden');
                switchTab('pos'); addInvRow(); loadCloud();
            } else alert("密码错误");
        }

        function switchTab(t) {
            ['dashboard', 'pos', 'inventory', 'history'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(t === 'dashboard') initDash();
            if(t === 'history') loadHist();
            if(t === 'pos') { loadCloud(); updateInvNo(); }
        }

        // --- 批量入库逻辑 ---
        function addInvRow() {
            const rowId = Date.now();
            const tr = document.createElement('tr');
            tr.id = `row-${rowId}`;
            tr.innerHTML = `
                <td class="p-1 border"><input type="text" class="w-full inv-id font-bold uppercase" placeholder="口味"></td>
                <td class="p-1 border"><select class="w-full inv-mode" onchange="recalcInv()"><option value="single">罐</option><option value="box">箱</option></select></td>
                <td class="p-1 border"><input type="number" class="w-full inv-qty" value="1" onchange="recalcInv()"></td>
                <td class="p-1 border"><input type="number" class="w-full inv-spec" value="1" onchange="recalcInv()"></td>
                <td class="p-1 border"><input type="number" class="w-full inv-total-cny" value="0" onchange="recalcInv()"></td>
                <td class="p-1 border font-bold text-green-600 inv-myr">RM 0.00</td>
                <td class="p-1 border"><input type="number" class="w-full inv-retail font-bold text-blue-600" placeholder="RM"></td>
                <td class="p-1 border text-center"><button onclick="document.getElementById('row-${rowId}').remove()" class="text-red-400">❌</button></td>
            `;
            document.getElementById('invRows').appendChild(tr);
        }

        function recalcInv() {
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const ship = parseFloat(document.getElementById('ship').value) || 0;
            const rows = document.querySelectorAll('#invRows tr');
            let totalPcs = 0;
            rows.forEach(r => {
                const q = parseFloat(r.querySelector('.inv-qty').value) || 0;
                const s = parseFloat(r.querySelector('.inv-spec').value) || 1;
                totalPcs += (r.querySelector('.inv-mode').value === 'box' ? q*s : q);
            });
            const shipPer = totalPcs > 0 ? (ship / totalPcs) : 0;
            rows.forEach(r => {
                const q = parseFloat(r.querySelector('.inv-qty').value) || 0;
                const s = parseFloat(r.querySelector('.inv-spec').value) || 1;
                const cny = parseFloat(r.querySelector('.inv-total-cny').value) || 0;
                const pcs = (r.querySelector('.inv-mode').value === 'box' ? q*s : q);
                const myr = (((cny/pcs) || 0) + shipPer) * rate;
                r.querySelector('.inv-myr').innerText = "RM " + myr.toFixed(2);
                r.dataset.cost = myr; r.dataset.pcs = pcs;
            });
        }

        async function saveInvToCloud() {
            const rows = document.querySelectorAll('#invRows tr');
            const data = [];
            for(let r of rows) {
                const id = r.querySelector('.inv-id').value;
                if(!id) continue;
                const old = cloudProds.find(p => p.product_id_code === id);
                data.push({
                    product_id_code: id, name_zh: id,
                    price_myr: parseFloat(r.dataset.cost),
                    stock_quantity: (old ? old.stock_quantity : 0) + parseInt(r.dataset.pcs),
                    suggested_price: parseFloat(r.querySelector('.inv-retail').value) || 0
                });
            }
            if(data.length === 0) return;
            const { error } = await _supabase.from('products').upsert(data, { onConflict: 'product_id_code' });
            if(!error) { alert("✅ 保存成功！"); document.getElementById('invRows').innerHTML = ""; addInvRow(); loadCloud(); }
            else alert("保存失败: " + error.message);
        }

        // --- 开单逻辑 (核心修复) ---
        async function submitOrder() {
            if(cart.length === 0) return alert("清单是空的");
            const disc = parseFloat(document.getElementById('posDisc').value) || 0;
            let totalRev = 0, totalCost = 0;

            for(let i of cart) {
                const p = cloudProds.find(x => x.product_id_code === i.code);
                totalRev += i.total; totalCost += (p.price_myr * i.qty);
                await _supabase.from('products').update({ 
                    stock_quantity: p.stock_quantity - i.qty,
                    total_sold: (p.total_sold || 0) + i.qty
                }).eq('product_id_code', i.code);
            }

            const { error } = await _supabase.from('orders').insert({
                order_no: document.getElementById('r-no').innerText,
                customer_name: document.getElementById('custName').value || "GUEST",
                grand_total_myr: totalRev - disc,
                total_cost_myr: totalCost,
                discount: disc
            });

            if(!error) { alert("✅ 订单已完成并存入云端"); downloadR(); cart = []; renderCart(); loadCloud(); }
            else alert("订单保存失败: " + error.message);
        }

        // --- 工具功能 ---
        async function loadCloud() {
            const { data } = await _supabase.from('products').select('*');
            cloudProds = data || [];
            const sel = document.getElementById('posSelect');
            sel.innerHTML = '<option value="">-- 选择罐头 (库存) --</option>';
            cloudProds.forEach(p => sel.innerHTML += `<option value="${p.product_id_code}">${p.product_id_code} (${p.stock_quantity})</option>`);
        }
        function autoPrice() {
            const p = cloudProds.find(x => x.product_id_code === document.getElementById('posSelect').value);
            if(p) document.getElementById('posPrice').value = p.suggested_price;
        }
        function addToCart() {
            const code = document.getElementById('posSelect').value;
            const qty = parseInt(document.getElementById('posQty').value);
            const price = parseFloat(document.getElementById('posPrice').value);
            if(!code || !price) return;
            cart.push({ code, qty, price, total: qty * price });
            renderCart();
        }
        // 这里是你要的删除功能！
        function removeFromCart(idx) {
            cart.splice(idx, 1);
            renderCart();
        }
        function renderCart() {
            const tbody = document.getElementById('r-items'); tbody.innerHTML = "";
            let sub = 0;
            cart.forEach((i, idx) => {
                tbody.innerHTML += `<tr><td><b>${i.code}</b></td><td>x${i.qty}</td><td class="text-right">${i.total.toFixed(2)}</td><td class="text-right"><button onclick="removeFromCart(${idx})" class="text-red-500 font-bold ml-2">❌</button></td></tr>`;
                sub += i.total;
            });
            const d = parseFloat(document.getElementById('posDisc').value) || 0;
            document.getElementById('r-total').innerText = (sub - d).toFixed(2);
            document.getElementById('r-date').innerText = new Date().toLocaleString();
            if(d > 0) { document.getElementById('r-disc-row').classList.remove('hidden'); document.getElementById('r-disc-val').innerText = d.toFixed(2); }
            else document.getElementById('r-disc-row').classList.add('hidden');
        }
        async function updateInvNo() {
            const { count } = await _supabase.from('orders').select('*', { count: 'exact', head: true });
            document.getElementById('r-no').innerText = "INV-" + new Date().getFullYear() + "-" + (count + 1).toString().padStart(4, '0');
        }
        async function loadHist() {
            const { data } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            document.getElementById('histBody').innerHTML = data.map(o => `<tr><td class="p-2 font-mono text-[10px]">${o.order_no}</td><td class="p-2">${new Date(o.created_at).toLocaleDateString()}</td><td class="p-2">${o.customer_name}</td><td class="p-2 text-right">RM ${o.grand_total_myr.toFixed(2)}</td><td class="p-2 text-right text-green-600 font-bold">RM ${(o.grand_total_myr - (o.total_cost_myr||0)).toFixed(2)}</td></tr>`).join('');
        }
        async function initDash() {
            const { data: prods } = await _supabase.from('products').select('*');
            const { data: ords } = await _supabase.from('orders').select('*').order('created_at', { ascending: true });
            
            document.getElementById('stockAlert').classList.toggle('hidden', !prods.some(p => p.stock_quantity < 5));
            
            const daily = {}; ords.forEach(o => { const d = new Date(o.created_at).toLocaleDateString(); daily[d] = (daily[d]||0) + o.grand_total_myr; });
            const ctx = document.getElementById('revChart');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type:'line', data:{ labels:Object.keys(daily), datasets:[{label:'营收', data:Object.values(daily), borderColor:'#f97316', tension:0.4}] }});

            const top = prods.map(p => ({ id: p.product_id_code, profit: ((p.suggested_price - p.price_myr)*p.total_sold) || 0 }))
                        .sort((a,b) => b.profit - a.profit).slice(0, 5);
            document.getElementById('profitRank').innerHTML = top.map(t => `<div class="flex justify-between border-b py-2"><span class="font-bold">${t.id}</span><span class="text-orange-600">RM ${t.profit.toFixed(2)}</span></div>`).join('');
        }
        function downloadR() {
            html2canvas(document.getElementById('receiptArea'), { scale: 3 }).then(c => {
                const a = document.createElement('a'); a.download = `4Paws-${Date.now()}.png`;
                a.href = c.toDataURL(); a.click();
            });
        }
        function updateReceipt() { document.getElementById('r-cust').innerText = document.getElementById('custName').value || "GUEST"; }
    </script>
</body>
</html>
